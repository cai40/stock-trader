services:
  - type: web
    name: stock-trader
    runtime: python
    plan: free
    autoDeploy: true
    buildCommand: pip install --no-cache-dir -r requirements.txt
    startCommand: PYTHONPATH=src streamlit run streamlit_app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
